name: syncache_hive
description: >-
  Hive storage backend for Syncache. Provides cross-platform persistent caching
  with full support for tag-based invalidation, pattern matching, and automatic
  JSON serialization.
version: 0.1.0
repository: https://github.com/Hamdal/syncache
homepage: https://github.com/Hamdal/syncache
issue_tracker: https://github.com/Hamdal/syncache/issues
topics:
  - cache
  - offline-first
  - hive
  - persistence

environment:
  sdk: ^3.0.0

dependencies:
  syncache: ^0.1.0
  hive: ^2.2.0

dev_dependencies:
  lints: ^3.0.0
  test: ^1.24.0
